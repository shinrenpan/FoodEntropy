name: FoodEntropy

options:
  bundleIdPrefix: com.shinrenpan
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hant
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"                 # Swift 6 語言模式（strict concurrency 內建）
    SWIFT_STRICT_CONCURRENCY: complete   # 明示 strict（00-constitution）
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "VZWPMD258L"       # Apple Developer Team ID（非機密）
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleMobileAds:                       # 唯一第三方（00-constitution）；classic SDK，iOS 尚無 Next-Gen
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "13.0.0"

targets:
  FoodEntropy:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinrenpan.FoodEntropy
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only（target 層明示，避免被預設 1,2 蓋掉）
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES          # 讓 build 自動抽取字串到 String Catalog
      configs:
        Debug:
          APS_ENVIRONMENT: development        # CloudKit push（entitlements 以 $(APS_ENVIRONMENT) 引用）
        Release:
          APS_ENVIRONMENT: production         # 上架用；避免硬寫 development 被審核擋
    entitlements:
      path: Sources/App/FoodEntropy.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shinrenpan.FoodEntropy
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: $(APS_ENVIRONMENT)   # CloudKit 靜默推播（Debug=development / Release=production）
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: 食熵
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # 僅用標準 HTTPS（AdMob / CloudKit）等豁免加密 → 免每次上傳被問匯出合規。
        ITSAppUsesNonExemptEncryption: false
        CFBundleLocalizations:                # v1 支援語言（繁中 + 英文）
          - zh-Hant
          - en
        UIBackgroundModes:                    # CloudKit 靜默推播需要
          - remote-notification
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 相機 / 相簿權限（食材 Form 拍照選圖用）
        NSCameraUsageDescription: 需要相機權限，用來拍攝食材照片。
        NSPhotoLibraryUsageDescription: 需要相簿權限，用來選擇食材照片。
        # AdMob：非個人化廣告、不跳 ATT（不追蹤、不用 IDFA），故不需 NSUserTrackingUsageDescription。
        # 正式 App ID（AdMob 後台的食熵 iOS App）；App ID 兩環境共用，測試/正式差異在「廣告單元 ID」（見 AdConfig）。
        GADApplicationIdentifier: ca-app-pub-9003896396180654~4290057776
        # SKAdNetwork 安裝歸因（Google + 合作買方完整清單，developers.google.com/admob/ios/privacy/strategies）。
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
