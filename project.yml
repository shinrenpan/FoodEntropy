        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        # Deeplink / Push 路由用（mvvmc-navigation）
        CFBundleURLTypes:
          - CFBundleURLName: com.shinrenpan.FoodEntropy
            CFBundleURLSchemes:
              - foodentropy

  FoodEntropyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FoodEntropyTests
    dependencies:
      - target: FoodEntropy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shinrenpan.FoodEntropyTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FoodEntropy:
    build:
      targets:
        FoodEntropy: all
    run:
      config: Debug
      storeKitConfiguration: FoodEntropy.storekit   # 本機沙盒測試 IAP（不進 app bundle）
    test:
      config: Debug
      targets:
        - FoodEntropyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
